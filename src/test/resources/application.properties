# ============================================================
# TEST configuration - overrides main application.properties
# Uses H2 in-memory database so tests never need a real MySQL
# ============================================================

# H2 in-memory datasource
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate: let it create/drop the schema from entities automatically
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Disable Flyway for tests - DDL is managed by Hibernate above
spring.flyway.enabled=false

# Server port (tests use random ports usually, but set a default)
server.port=${PORT:8087}

# Thymeleaf
spring.thymeleaf.cache=false

# Disable Google OAuth2 for tests (no real credentials needed)
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Mail - disable actual sending in tests
spring.mail.host=localhost
spring.mail.port=25
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Custom mail properties expected by EmailService
mail.from.name=FlowTrack Test
mail.from.email=test@flowtrack.local

# Razorpay - test keys (no real calls during unit tests)
razorpay.key.id=rzp_test_placeholder
razorpay.key.secret=placeholder_secret
razorpay.currency=INR
razorpay.company.name=FlowTrack
razorpay.webhook.secret=placeholder_secret

# Gemini API - not called during unit tests
gemini.api.key=AIzaSyBa-JIBwHTyMY4jUKRKJ-nOw1t61CRSgcE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent

# Verification configuration
verification.mode=MOCK
verification.auto=true
verification.webclient.connection-timeout=10000
verification.webclient.read-timeout=30000
verification.webclient.write-timeout=10000
verification.webclient.max-connections=50
verification.webclient.retry-attempts=3
verification.webclient.retry-delay-ms=1000

# Reduce log noise during tests
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type=WARN
logging.level.org.springframework=WARN
logging.level.com.example.IMS=INFO
