<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<div th:replace="header :: myHeader"></div>
</head>
<body class="sb-nav-fixed">
    <div th:replace="navbar :: myNavbar"></div>
    <div id="layoutSidenav">
        <div th:replace="sidebar :: mySidebar"></div>
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid">
                    <div class="row justify-content-center mt-5">
                        <div class="col-lg-7">
                            <div class="card shadow border-left-success">
                                <div class="card-body text-center py-5">
                                    <div class="mb-4">
                                        <i class="fas fa-check-circle fa-4x text-success"></i>
                                    </div>
                                    <h2 class="font-weight-bold text-success">Onboarding Complete!</h2>
                                    <p class="lead text-muted mt-3">
                                        Congratulations! Your business profile is <strong>verified and active</strong>.
                                        You now have full access to all FlowTrack features.
                                    </p>

                                    <!-- Active profiles -->
                                    <div th:if="${!profiles.isEmpty()}" class="mt-3">
                                        <div th:each="profile : ${profiles}"
                                             th:if="${profile.verificationStatus.name() == 'VERIFIED'}"
                                             class="alert alert-success text-left">
                                            <i class="fas fa-building mr-1"></i>
                                            <strong th:text="${profile.legalBusinessName}">Business Name</strong>
                                            <span class="badge badge-success ml-2">VERIFIED</span>
                                            <span th:if="${profile.onboardingStage != null}"
                                                  class="badge badge-primary ml-1" th:text="${profile.onboardingStage}"></span>
                                        </div>
                                    </div>

                                    <div class="row mt-4 justify-content-center">
                                        <div class="col-md-4 mb-3">
                                            <div class="card bg-light text-center p-3">
                                                <i class="fas fa-boxes fa-2x text-primary mb-2"></i>
                                                <p class="mb-2 font-weight-bold">Manage Inventory</p>
                                                <a href="/ItemList" class="btn btn-primary btn-sm">Go &rarr;</a>
                                            </div>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <div class="card bg-light text-center p-3">
                                                <i class="fas fa-truck fa-2x text-info mb-2"></i>
                                                <p class="mb-2 font-weight-bold">Vendors</p>
                                                <a href="/VendorList" class="btn btn-info btn-sm">Go &rarr;</a>
                                            </div>
                                        </div>
                                        <div class="col-md-4 mb-3">
                                            <div class="card bg-light text-center p-3">
                                                <i class="fas fa-tachometer-alt fa-2x text-success mb-2"></i>
                                                <p class="mb-2 font-weight-bold">Dashboard</p>
                                                <a href="/" class="btn btn-success btn-sm">Go &rarr;</a>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; FlowTrack 2024</div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
