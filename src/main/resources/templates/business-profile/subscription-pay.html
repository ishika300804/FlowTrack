<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment - FlowTrack</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .pay-card {
            max-width: 480px; margin: 5rem auto;
            background: white; border-radius: 20px;
            padding: 2.5rem; border: 1px solid #e2e8f0;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
        }
        .plan-badge {
            display: inline-block; padding: 0.3rem 1rem;
            border-radius: 50px; font-size: 0.8rem; font-weight: 600;
        }
        .plan-badge.CORE { background: #ebf4ff; color: #3182ce; }
        .plan-badge.PREMIUM { background: #faf5ff; color: #805ad5; }
        .amount { font-size: 2.5rem; font-weight: 800; color: #2d3748; }
        .label { font-size: 0.8rem; color: #718096; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; }
        .btn-pay {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 0.9rem 2rem;
            border-radius: 50px; font-weight: 600; font-size: 1rem;
            width: 100%; transition: opacity 0.2s;
        }
        .btn-pay:hover { opacity: 0.9; color: white; }
        .secure-badge { font-size: 0.8rem; color: #718096; text-align: center; margin-top: 0.75rem; }
    </style>
</head>
<body>

<div class="pay-card">
    <!-- Header -->
    <div class="d-flex align-items-center mb-4">
        <a th:href="@{/business-profile/subscription(profileId=${profileId})}"
           class="btn btn-sm btn-outline-secondary me-3">
            <i class="fas fa-arrow-left"></i>
        </a>
        <div>
            <h5 class="mb-0 fw-bold">Complete Payment</h5>
            <small class="text-muted">Secure checkout via Razorpay</small>
        </div>
    </div>

    <!-- Flash errors -->
    <div th:if="${errorMessage}" class="alert alert-danger py-2" th:text="${errorMessage}"></div>

    <!-- Plan summary -->
    <div class="mb-4 p-3 rounded" style="background:#f8fafc; border:1px solid #e2e8f0;">
        <div class="label mb-1">Selected Plan</div>
        <div class="d-flex align-items-center justify-content-between">
            <span class="plan-badge"
                  th:classappend="${planName}"
                  th:text="${planName} + ' Plan'">Plan</span>
            <div class="amount" th:text="'₹' + ${#numbers.formatDecimal(planAmount, 0, 'COMMA', 0, 'POINT')}">₹0</div>
        </div>
        <div class="text-muted mt-1" style="font-size:0.8rem;">Billed monthly &nbsp;·&nbsp; 1 month</div>
    </div>

    <!-- Order info from flash -->
    <div class="mb-3" th:if="${paymentOrder}">
        <div class="label">Order Reference</div>
        <code class="text-secondary" th:text="${paymentOrder.orderId}">—</code>
    </div>

    <!-- Error if no order was created (user navigated directly) -->
    <div th:if="${paymentOrder == null}" class="alert alert-warning py-2">
        No active payment order found.
        <a th:href="@{/business-profile/subscription(profileId=${profileId})}">Go back and select a plan</a>.
    </div>

    <!-- Pay Now button -->
    <button th:if="${paymentOrder != null}"
            class="btn btn-pay mt-2"
            onclick="openRazorpay()"
            type="button">
        <i class="fas fa-lock me-2"></i> Pay Now
    </button>
    <div class="secure-badge">
        <i class="fas fa-shield-alt me-1"></i> 256-bit SSL secured &nbsp;·&nbsp; Powered by Razorpay
    </div>

    <!-- Hidden verification form submitted on payment success -->
    <form id="verifyForm"
          th:action="@{/business-profile/subscription/verify}"
          method="post" style="display:none;">
        <input type="hidden" name="profileId"          th:value="${profileId}">
        <input type="hidden" name="plan"               th:value="${planName}">
        <input type="hidden" name="razorpayOrderId"    id="rzpOrderId">
        <input type="hidden" name="razorpayPaymentId"  id="rzpPaymentId">
        <input type="hidden" name="razorpaySignature"  id="rzpSignature">
    </form>
</div>

<!-- Razorpay Checkout SDK -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script th:inline="javascript">
    var RZP_ORDER_ID   = /*[[${paymentOrder != null ? paymentOrder.orderId : ''}]]*/ '';
    var RZP_AMOUNT     = /*[[${paymentOrder != null ? paymentOrder.amount : 0}]]*/ 0;
    var RZP_KEY        = /*[[${razorpayKeyId}]]*/ '';
    var USER_NAME      = /*[[${userName}]]*/ '';
    var USER_EMAIL     = /*[[${userEmail}]]*/ '';
    var PLAN_NAME      = /*[[${planName}]]*/ '';

    function openRazorpay() {
        var options = {
            key:          RZP_KEY,
            amount:       RZP_AMOUNT * 100,   // paise
            currency:     'INR',
            name:         'FlowTrack',
            description:  PLAN_NAME + ' Plan — 1 Month',
            order_id:     RZP_ORDER_ID,
            prefill: {
                name:  USER_NAME,
                email: USER_EMAIL
            },
            theme: { color: '#667eea' },
            handler: function(response) {
                document.getElementById('rzpOrderId').value   = response.razorpay_order_id;
                document.getElementById('rzpPaymentId').value = response.razorpay_payment_id;
                document.getElementById('rzpSignature').value = response.razorpay_signature;
                document.getElementById('verifyForm').submit();
            },
            modal: {
                ondismiss: function() {
                    alert('Payment cancelled. You can retry by selecting a plan again.');
                }
            }
        };
        var rzp = new Razorpay(options);
        rzp.open();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
