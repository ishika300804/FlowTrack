<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<div th:replace="header :: myHeader"></div>
</head>
<body class="sb-nav-fixed">
    <div th:replace="navbar :: myNavbar"></div>
    <div id="layoutSidenav">
        <div th:replace="sidebar :: mySidebar"></div>
        <div id="layoutSidenav_content">
            <main>
                <div class="container-fluid">
                    <h1 class="mt-4">Edit Business Profile</h1>
                    <ol class="breadcrumb mb-4">
                        <li class="breadcrumb-item"><a href="/">Home</a></li>
                        <li class="breadcrumb-item"><a href="/business-profile/status">Business Profile</a></li>
                        <li class="breadcrumb-item active">Edit</li>
                    </ol>

                    <div th:if="${errorMessage}" class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="alert alert-warning">
                        <i class="fas fa-exclamation-triangle"></i>
                        <strong>Note:</strong> GSTIN, PAN, CIN, and Udyam numbers <strong>cannot be changed</strong>
                        after the profile is created (regulatory requirement).
                        Only address and business name can be edited.
                    </div>

                    <div class="card shadow mb-4">
                        <div class="card-header"><i class="fas fa-edit mr-1"></i> Update Business Details</div>
                        <div class="card-body">
                            <form th:action="@{/business-profile/edit}"
                                  th:object="${profileRequest}"
                                  method="post">

                                <!-- Hidden profile ID -->
                                <input type="hidden" name="profileId" th:value="${profileId}"/>

                                <!-- Legal Name & Type (type is read-only) -->
                                <div class="form-row">
                                    <div class="form-group col-md-8">
                                        <label>Legal Business Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control"
                                               th:field="*{legalBusinessName}"
                                               th:classappend="${#fields.hasErrors('legalBusinessName')} ? 'is-invalid' : ''"/>
                                        <div class="invalid-feedback" th:errors="*{legalBusinessName}"></div>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>Business Type</label>
                                        <input type="text" class="form-control-plaintext font-weight-bold"
                                               th:value="${profileRequest.businessType}" readonly/>
                                        <!-- Hidden to preserve the value in submission -->
                                        <input type="hidden" th:field="*{businessType}"/>
                                    </div>
                                </div>

                                <!-- GSTIN & PAN (read-only) -->
                                <div class="form-row">
                                    <div class="form-group col-md-6">
                                        <label>GSTIN <small class="text-muted">(cannot be changed)</small></label>
                                        <input type="text" class="form-control-plaintext"
                                               th:value="${profileRequest.gstin}" readonly/>
                                        <input type="hidden" th:field="*{gstin}"/>
                                    </div>
                                    <div class="form-group col-md-6">
                                        <label>PAN Number <small class="text-muted">(cannot be changed)</small></label>
                                        <input type="text" class="form-control-plaintext"
                                               value="******* (encrypted)" readonly/>
                                        <input type="hidden" th:field="*{panNumber}"/>
                                    </div>
                                </div>

                                <hr/>

                                <!-- Editable Address -->
                                <div class="form-group">
                                    <label>Registered Address <span class="text-danger">*</span></label>
                                    <textarea class="form-control" rows="3"
                                              th:field="*{registeredAddress}"
                                              th:classappend="${#fields.hasErrors('registeredAddress')} ? 'is-invalid' : ''"></textarea>
                                    <div class="invalid-feedback" th:errors="*{registeredAddress}"></div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group col-md-8">
                                        <label>State <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control"
                                               th:field="*{state}"
                                               th:classappend="${#fields.hasErrors('state')} ? 'is-invalid' : ''"/>
                                        <div class="invalid-feedback" th:errors="*{state}"></div>
                                    </div>
                                    <div class="form-group col-md-4">
                                        <label>Pincode <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control"
                                               th:field="*{pincode}"
                                               maxlength="6"
                                               th:classappend="${#fields.hasErrors('pincode')} ? 'is-invalid' : ''"/>
                                        <div class="invalid-feedback" th:errors="*{pincode}"></div>
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                    <a href="/business-profile/status" class="btn btn-secondary ml-2">
                                        <i class="fas fa-times"></i> Cancel
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
            <footer class="py-4 bg-light mt-auto">
                <div class="container-fluid">
                    <div class="d-flex align-items-center justify-content-between small">
                        <div class="text-muted">Copyright &copy; FlowTrack 2024</div>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
