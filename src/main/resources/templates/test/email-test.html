<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Service Test - FlowTrack</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <style>
        body {
            padding: 20px;
            background-color: #f8f9fa;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .test-section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        .result {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }
        .result.success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .result.error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1 class="mb-4">📧 Email Service Test</h1>
        <p class="text-muted">Test the email functionality of FlowTrack</p>
        <hr>

        <!-- Simple Email Test -->
        <div class="test-section">
            <h3>1. Send Simple Text Email</h3>
            <form id="simpleEmailForm">
                <div class="mb-3">
                    <label for="simpleEmailTo" class="form-label">Recipient Email:</label>
                    <input type="email" class="form-control" id="simpleEmailTo" required>
                </div>
                <div class="mb-3">
                    <label for="simpleEmailSubject" class="form-label">Subject:</label>
                    <input type="text" class="form-control" id="simpleEmailSubject" value="Test Email from FlowTrack" required>
                </div>
                <div class="mb-3">
                    <label for="simpleEmailBody" class="form-label">Message:</label>
                    <textarea class="form-control" id="simpleEmailBody" rows="4" required>This is a test email from FlowTrack Email Service. If you receive this, the email service is working correctly!</textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send Simple Email</button>
                <div id="simpleEmailResult" class="result"></div>
            </form>
        </div>

        <!-- HTML Email Test -->
        <div class="test-section">
            <h3>2. Send HTML Email</h3>
            <form id="htmlEmailForm">
                <div class="mb-3">
                    <label for="htmlEmailTo" class="form-label">Recipient Email:</label>
                    <input type="email" class="form-control" id="htmlEmailTo" required>
                </div>
                <div class="mb-3">
                    <label for="htmlEmailSubject" class="form-label">Subject:</label>
                    <input type="text" class="form-control" id="htmlEmailSubject" value="HTML Test Email from FlowTrack" required>
                </div>
                <div class="mb-3">
                    <label for="htmlEmailBody" class="form-label">HTML Content:</label>
                    <textarea class="form-control" id="htmlEmailBody" rows="6" required><html><body><h2 style="color: #007bff;">FlowTrack Email Test</h2><p>This is a <strong>HTML formatted</strong> email.</p><ul><li>Feature 1: Email Service</li><li>Feature 2: Payment Gateway</li></ul><p style="color: #28a745;">If you can see this HTML formatting, the service works perfectly!</p></body></html></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Send HTML Email</button>
                <div id="htmlEmailResult" class="result"></div>
            </form>
        </div>

        <!-- Welcome Email Test -->
        <div class="test-section">
            <h3>3. Send Welcome Email</h3>
            <form id="welcomeEmailForm">
                <div class="mb-3">
                    <label for="welcomeEmail" class="form-label">User Email:</label>
                    <input type="email" class="form-control" id="welcomeEmail" required>
                </div>
                <div class="mb-3">
                    <label for="welcomeUserName" class="form-label">User Name:</label>
                    <input type="text" class="form-control" id="welcomeUserName" value="Test User" required>
                </div>
                <div class="mb-3">
                    <label for="welcomeUserType" class="form-label">User Type:</label>
                    <select class="form-control" id="welcomeUserType" required>
                        <option value="Vendor">Vendor</option>
                        <option value="Retailer">Retailer</option>
                        <option value="Investor">Investor</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Send Welcome Email</button>
                <div id="welcomeEmailResult" class="result"></div>
            </form>
        </div>

        <!-- OTP Email Test -->
        <div class="test-section">
            <h3>4. Send OTP Email</h3>
            <form id="otpEmailForm">
                <div class="mb-3">
                    <label for="otpEmail" class="form-label">Recipient Email:</label>
                    <input type="email" class="form-control" id="otpEmail" required>
                </div>
                <div class="mb-3">
                    <label for="otpCode" class="form-label">OTP Code:</label>
                    <input type="text" class="form-control" id="otpCode" value="123456" required>
                </div>
                <button type="submit" class="btn btn-primary">Send OTP Email</button>
                <div id="otpEmailResult" class="result"></div>
            </form>
        </div>

        <div class="mt-4">
            <a href="/test/payment" class="btn btn-secondary">Go to Payment Test</a>
            <a href="/" class="btn btn-outline-secondary">Back to Home</a>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Simple Email
        $('#simpleEmailForm').submit(function(e) {
            e.preventDefault();
            sendEmail('/test/email/send-simple', {
                to: $('#simpleEmailTo').val(),
                subject: $('#simpleEmailSubject').val(),
                body: $('#simpleEmailBody').val(),
                html: false
            }, '#simpleEmailResult');
        });

        // HTML Email
        $('#htmlEmailForm').submit(function(e) {
            e.preventDefault();
            sendEmail('/test/email/send-html', {
                to: $('#htmlEmailTo').val(),
                subject: $('#htmlEmailSubject').val(),
                body: $('#htmlEmailBody').val(),
                html: true
            }, '#htmlEmailResult');
        });

        // Welcome Email
        $('#welcomeEmailForm').submit(function(e) {
            e.preventDefault();
            $.ajax({
                url: '/test/email/send-welcome',
                type: 'POST',
                data: {
                    email: $('#welcomeEmail').val(),
                    userName: $('#welcomeUserName').val(),
                    userType: $('#welcomeUserType').val()
                },
                success: function(response) {
                    showResult('#welcomeEmailResult', 'success', response.message);
                },
                error: function(xhr) {
                    showResult('#welcomeEmailResult', 'error', xhr.responseJSON ? xhr.responseJSON.message : 'Failed to send email');
                }
            });
        });

        // OTP Email
        $('#otpEmailForm').submit(function(e) {
            e.preventDefault();
            $.ajax({
                url: '/test/email/send-otp',
                type: 'POST',
                data: {
                    email: $('#otpEmail').val(),
                    otp: $('#otpCode').val()
                },
                success: function(response) {
                    showResult('#otpEmailResult', 'success', response.message);
                },
                error: function(xhr) {
                    showResult('#otpEmailResult', 'error', xhr.responseJSON ? xhr.responseJSON.message : 'Failed to send email');
                }
            });
        });

        function sendEmail(url, data, resultDiv) {
            $.ajax({
                url: url,
                type: 'POST',
                contentType: 'application/json',
                data: JSON.stringify(data),
                success: function(response) {
                    showResult(resultDiv, 'success', response.message);
                },
                error: function(xhr) {
                    showResult(resultDiv, 'error', xhr.responseJSON ? xhr.responseJSON.message : 'Failed to send email');
                }
            });
        }

        function showResult(selector, type, message) {
            $(selector).removeClass('success error').addClass(type).text(message).show();
            setTimeout(function() {
                $(selector).fadeOut();
            }, 5000);
        }
    </script>
</body>
</html>
