<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-container {
            max-width: 450px;
            margin: 0 auto;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 30px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <div class="card">
                <div class="card-header text-center">
                    <h3><i class="fas fa-warehouse"></i> FlowTrack</h3>
                    <p class="mb-0">Login to your account</p>
                </div>
                <div class="card-body p-4">
                    <!-- Flash message from registration redirect -->
                    <div th:if="${successMessage}" class="alert alert-success">
                        <i class="fas fa-check-circle"></i>
                        <span th:text="${successMessage}">Registration successful!</span>
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success">
                        <i class="fas fa-check-circle"></i> Registration successful! Please login.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        <i class="fas fa-sign-out-alt"></i> You have been logged out successfully.
                    </div>
                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="fas fa-exclamation-circle"></i> Invalid username or password.
                    </div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    
                    <form th:action="@{/login}" method="post">
                        <div class="form-group">
                            <label for="username"><i class="fas fa-user"></i> Username</label>
                            <input type="text" class="form-control" id="username" name="username" 
                                   placeholder="Enter username" required autofocus>
                        </div>
                        <div class="form-group">
                            <label for="password"><i class="fas fa-lock"></i> Password</label>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Enter password" required>
                        </div>
                        <div class="form-group form-check">
                            <input type="checkbox" class="form-check-input" id="remember" name="remember-me">
                            <label class="form-check-label" for="remember">Remember me</label>
                        </div>
                        <button type="submit" class="btn btn-primary btn-block btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Login
                        </button>
                    </form>

                    <!-- Google Sign-In -->
                    <div class="text-center my-3">
                        <p class="text-muted mb-2" style="font-size:0.85rem; position:relative;">
                            <span style="background:#fff; padding:0 10px; position:relative; z-index:1;">Or continue with</span>
                            <hr style="position:absolute; top:50%; left:0; right:0; margin:0; border-color:#e2e8f0; z-index:0;">
                        </p>
                        <a href="/oauth2/authorization/google"
                           class="btn btn-outline-secondary btn-block"
                           style="border-radius:50px; font-weight:500; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                                 alt="Google" width="18" height="18">
                            Continue with Google
                        </a>
                    </div>

                    <hr>
                    <div class="text-center">
                        <p class="mb-2">Don't have an account?</p>
                        <a th:href="@{/register/retailer}" class="btn btn-outline-success btn-sm mr-2 mb-1">
                            <i class="fas fa-store"></i> Register as Retailer
                        </a>
                        <a th:href="@{/register/vendor}" class="btn btn-outline-primary btn-sm mb-1">
                            <i class="fas fa-truck"></i> Register as Vendor
                        </a>
                        <p class="mt-2 mb-0"><small><a th:href="@{/get-started}" class="text-muted">See all roles →</a></small></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
