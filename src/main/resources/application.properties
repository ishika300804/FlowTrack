# ========================================================================
# STAGED ROLLOUT CONFIGURATION (Prompt 4)
# ========================================================================

# Phase 1: Enable onboarding feature (schema + UI available)
# Set to false to completely hide onboarding features
feature.onboarding.enabled=true

# Phase 2: Soft enforcement (show banners/notifications)
# When true, users see reminders to complete onboarding but can still access features
# Set to true after Phase 1 is stable (recommended: 1 week after deployment)
feature.onboarding.soft-enforcement=true

# Phase 3: Hard enforcement (block features for incomplete onboarding)
# When true, users without ACTIVE onboarding_stage are blocked from protected operations
# Set to true after Phase 2 metrics show good conversion (recommended: 2-4 weeks after Phase 2)
feature.onboarding.hard-enforcement=false

# Grace period (days) before hard enforcement applies to existing users
# Allows legacy users time to complete onboarding after hard enforcement is enabled
# Recommended: 30 days
feature.onboarding.grace-period-days=30

# Admin override: Allow platform admins to bypass enforcement
# Useful for testing and emergency access
feature.onboarding.admin-override=true

# ========================================================================
# ROLLBACK STRATEGY
# ========================================================================
# To rollback instantly without code deployment:
# 1. Set feature.onboarding.hard-enforcement=false (disables blocking)
# 2. Set feature.onboarding.soft-enforcement=false (disables banners)
# 3. Set feature.onboarding.enabled=false (hides all onboarding UI)
# 
# Database rollback (if needed):
# Run: db/migration/rollback/R__rollback_business_profile.sql
# ========================================================================

